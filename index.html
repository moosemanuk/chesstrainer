<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <title>Chess Opening Trainer</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body>
    <div class="app-container">

        <h2>Chess Opening Trainer</h2>

        <div id="status-message" class="status-neutral">
            Select an opening to begin a drill
        </div>

        <div class = "controls" >
            <label for = "openingSelect"></label>
            <select id = "openingSelect"></select>
            <label for = "variationSelect"></label>
            <select id = "variationSelect"></select>
            <button id = "flipBtn" data-side="w">Training as White</button>
            <button id = "resetBtn">Start drill</button>            
        </div>

        <!--<div id = "myBoard" style = "width: 500px"></div>-->
        <div id = "myBoard"></div>
        <script src="lib/jquery-4.0.0.js"></script>
        <script src="lib/chessboard-1.0.0.min.js"></script>
        <script src="lib/chess.js"></script>

        <script src = "js/openings.js"></script>
        <script src = "js/main.js"></script>
        
    </div>
    </body>
</html>
